<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kisan Mitra - Farming Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green-dark  : #1a3a2a;
    --green-mid   : #2d6a4f;
    --green-light : #52b788;
    --green-pale  : #d8f3dc;
    --amber       : #e9c46a;
    --soil        : #6b4226;
    --white       : #f8fdf9;
    --bubble-user : #2d6a4f;
    --bubble-bot  : #ffffff;
    --text-dark   : #1a3a2a;
    --text-muted  : #6b8f71;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #1a3a2a 0%, #2d6a4f 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ========== ROBOT BUTTON (FLOATING) ========== */
  .robot-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    z-index: 1000;
    border: 3px solid white;
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .robot-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    animation: none;
  }
  .robot-btn:active {
    transform: scale(0.95);
  }
  .robot-btn span {
    font-size: 38px;
  }
  .robot-tooltip {
    position: absolute;
    right: 80px;
    background: white;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--green-mid);
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .robot-btn:hover .robot-tooltip {
    opacity: 1;
  }

  /* ========== CHAT WIDGET (HIDDEN BY DEFAULT) ========== */
  .chat-widget {
    position: fixed;
    bottom: 120px;
    right: 30px;
    width: 390px;
    height: 700px;
    background: var(--white);
    border-radius: 25px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    z-index: 999;
    transform: scale(0);
    opacity: 0;
    transform-origin: bottom right;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .chat-widget.open {
    transform: scale(1);
    opacity: 1;
    pointer-events: all;
  }

  /* Header */
  .chat-header {
    background: var(--green-mid);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .chat-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .chat-header-info { flex: 1; }
  .chat-header-name {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 16px;
    color: #fff;
    font-weight: 400;
  }
  .chat-header-sub {
    font-size: 11px;
    color: var(--green-pale);
    margin-top: 2px;
  }
  .close-chat {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  .close-chat:hover {
    background: rgba(255,255,255,0.3);
  }
  .close-chat span {
    font-size: 18px;
    color: white;
  }

  /* Quick chips */
  .chips {
    background: var(--white);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    border-bottom: 1px solid #e8f5e9;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    white-space: nowrap;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--green-light);
    color: var(--green-mid);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover {
    background: var(--green-mid);
    color: #fff;
    border-color: var(--green-mid);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
  }

  .date-label {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    background: #e8f5e955;
    padding: 3px 12px;
    border-radius: 10px;
    align-self: center;
  }

  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .bubble-row.user { flex-direction: row-reverse; }

  .bot-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .bubble.bot {
    background: var(--bubble-bot);
    color: var(--text-dark);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px #00000012;
  }
  .bubble.user {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble-time {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 3px;
    padding: 0 4px;
    align-self: flex-end;
  }

  .typing { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green-light);
    animation: bounce 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }

  /* Input bar */
  .input-bar {
    padding: 10px 14px;
    background: var(--white);
    border-top: 1px solid #e8f5e9;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: #f0faf2;
    border-radius: 22px;
    border: 1.5px solid #c8e6c9;
    padding: 8px 14px;
    display: flex;
    align-items: center;
  }
  .input-wrap:focus-within { border-color: var(--green-light); }
  #msg-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    outline: none;
    resize: none;
    max-height: 70px;
    line-height: 1.4;
  }
  #msg-input::placeholder { color: #aac8ae; }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--green-mid);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: var(--green-light); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn svg { width:18px; height:18px; fill:#fff; }
</style>
</head>
<body>

<!-- ROBOT BUTTON (Always visible) -->
<div class="robot-btn" onclick="openChat()">
  <span>🤖</span>
  <div class="robot-tooltip">Ask Kisan Mitra</div>
</div>

<!-- CHAT WIDGET (Hidden initially) -->
<div class="chat-widget" id="chatWidget">
  <!-- Header -->
  <div class="chat-header" onclick="closeChat()">
    <div class="chat-avatar">🌾</div>
    <div class="chat-header-info">
      <div class="chat-header-name">Kisan Mitra</div>
      <div class="chat-header-sub">🌿 Farmer Assistant · Online</div>
    </div>
    <div class="close-chat">
      <span>✕</span>
    </div>
  </div>

  <!-- Quick chips -->
  <div class="chips">
    <button class="chip" onclick="sendChip('my crop has disease')">🌿 Crop disease</button>
    <button class="chip" onclick="sendChip('weather in Ahmedabad')">🌤️ Weather</button>
    <button class="chip" onclick="sendChip('which fertilizer for wheat')">🧪 Fertilizer</button>
    <button class="chip" onclick="sendChip('insects on my field')">🐛 Pest control</button>
    <button class="chip" onclick="sendChip('government scheme')">🏛️ Govt schemes</button>
    <button class="chip" onclick="sendChip('soil health tips')">🪴 Soil health</button>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="date-label">Today</div>
    <div class="bubble-row">
      <div class="bot-avatar">🌾</div>
      <div>
        <div class="bubble bot">Namaste Kisan bhai! 🙏<br><br>I am Kisan Mitra. Ask me about crops, weather, soil, fertilizer, pests or government schemes.</div>
        <div class="bubble-time" id="welcomeTime"></div>
      </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Ask about your crops..."></textarea>
    </div>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000/chat";
  const chatWidget = document.getElementById("chatWidget");
  const chatArea = document.getElementById("chatArea");
  const input = document.getElementById("msg-input");

  // Set welcome time
  document.getElementById("welcomeTime").textContent = getTime();

  // Auto resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  });

  // Send on Enter
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // Open chat widget
  function openChat() {
    chatWidget.classList.add("open");
    setTimeout(() => scrollBottom(), 100);
  }

  // Close chat widget
  function closeChat() {
    chatWidget.classList.remove("open");
  }

  function addBubble(text, role) {
    const row = document.createElement("div");
    row.className = `bubble-row ${role}`;
    const time = getTime();

    if (role === "bot") {
      row.innerHTML = `
        <div class="bot-avatar">🌾</div>
        <div>
          <div class="bubble bot">${text}</div>
          <div class="bubble-time">${time}</div>
        </div>`;
    } else {
      row.innerHTML = `
        <div>
          <div class="bubble user">${text}</div>
          <div class="bubble-time">${time}</div>
        </div>`;
    }

    chatArea.appendChild(row);
    scrollBottom();
    return row;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "bubble-row";
    row.id = "typing";
    row.innerHTML = `
      <div class="bot-avatar">🌾</div>
      <div class="bubble bot typing">
        <span></span><span></span><span></span>
      </div>`;
    chatArea.appendChild(row);
    scrollBottom();
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";

    addBubble(text, "user");
    showTyping();

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();
      addBubble(data.reply, "bot");
    } catch (err) {
      hideTyping();
      addBubble("Sorry, could not connect to server. Make sure main.py is running.", "bot");
    }
  }

  function sendChip(text) {
    input.value = text;
    sendMessage();
  }
</script>
</body>
</html>
